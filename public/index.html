<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>api-framework</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 48px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 480px;
      width: 90%;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .status {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .info {
      background: #f5f5f5;
      border-radius: 12px;
      padding: 16px;
      text-align: left;
    }
    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      color: #555;
    }
    .info-item:last-child { border-bottom: none; }
    .info-item .label { color: #888; }
    .info-item .value { color: #333; font-weight: 500; }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🐱</div>
    <h1>api-framework</h1>
    <p class="subtitle">通用 API 反向代理框架</p>
    <div class="status">● 服务运行中</div>
    <div class="info">
      <div class="info-item">
        <span class="label">状态</span>
        <span class="value">正常运行</span>
      </div>
      <div class="info-item">
        <span class="label">时间</span>
        <span class="value" id="time">-</span>
      </div>
      <div class="info-item">
        <span class="label">版本</span>
        <span class="value" id="version">-</span>
      </div>
    </div>
    <div class="footer">Powered by api-framework</div>
  </div>
  <script>
    document.getElementById('time').textContent = new Date().toLocaleString('zh-CN')
    fetch('/api/status')
      .then(r => r.json())
      .then(d => { document.getElementById('version').textContent = d.version || '-' })
      .catch(() => { document.getElementById('version').textContent = 'unknown' })
  </script>
</body>
</html>
